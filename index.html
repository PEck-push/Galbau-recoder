<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galbau | Voice</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1"></script>
    
    <style>
        /* PENTAGRAM STYLE: Radikaler Minimalismus, starke Kontraste */
        :root {
            --galbau-red: #D21E1E; /* Klassisches, kräftiges CI Rot */
            --bg-color: #FAFAFA;
            --text-main: #111111;
            --text-muted: #888888;
            /* Klassische, saubere System-Schriftart (Galbau-Stil) */
            --font-family: 'Helvetica Neue', Arial, sans-serif; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: var(--font-family); 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            height: 100dvh; /* Mobile Browser UI Fix */
            justify-content: space-between;
            padding: 8vh 6vw;
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER: Clean & Typografisch */
        header { text-align: left; }
        h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.05em; text-transform: uppercase; margin-bottom: 5px; }
        h1 span { color: var(--galbau-red); }
        .subtitle { font-size: 0.9rem; color: var(--text-muted); font-weight: 500; }

        /* MAIN: Der riesige Button für das Auto */
        main { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        #recordBtn { 
            width: 65vw; 
            height: 65vw; 
            max-width: 280px; 
            max-height: 280px; 
            border-radius: 50%; 
            background-color: var(--text-main); 
            color: var(--bg-color); 
            font-size: 1.5rem; 
            font-weight: 700; 
            letter-spacing: 0.1em;
            border: none; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            /* Mobile Fixes */
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        /* Aufnahme-Status: Hartes Galbau-Rot */
        #recordBtn.recording { 
            background-color: var(--galbau-red); 
            transform: scale(0.95);
            box-shadow: 0 0 0 15px rgba(210, 30, 30, 0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(210, 30, 30, 0.4); }
            70% { box-shadow: 0 0 0 30px rgba(210, 30, 30, 0); }
            100% { box-shadow: 0 0 0 0 rgba(210, 30, 30, 0); }
        }

        /* STATUS-TEXT: Groß und extrem lesbar */
        #status { 
            margin-top: 40px; 
            font-size: 1.1rem; 
            font-weight: 500; 
            text-align: center; 
            min-height: 60px;
            color: var(--text-main);
        }

        /* FOOTER: Unsichtbare Technik */
        footer { width: 100%; }
        input { 
            width: 100%; 
            padding: 15px 0; 
            border: none; 
            border-bottom: 2px solid #E0E0E0; 
            background: transparent; 
            font-family: var(--font-family); 
            font-size: 0.9rem; 
            color: var(--text-muted);
            outline: none; 
            transition: border-color 0.3s;
            border-radius: 0;
        }
        input:focus { border-bottom-color: var(--text-main); color: var(--text-main); }
        input::placeholder { color: #CCCCCC; }

    </style>
</head>
<body>

    <header>
        <h1>Galbau<span>.</span></h1>
        <div class="subtitle">Sprachprotokoll (Offline)</div>
    </header>

    <main>
        <button id="recordBtn">START</button>
        <div id="status">Bereit. Sprich alle Gewerke ein.</div>
    </main>

    <footer>
        <input type="text" id="webhookUrl" placeholder="n8n Webhook URL (wird gespeichert)">
    </footer>

    <script>
        // Webhook URL Management
        const urlInput = document.getElementById('webhookUrl');
        urlInput.value = localStorage.getItem('galbauUrl') || '';
        urlInput.addEventListener('change', (e) => localStorage.setItem('galbauUrl', e.target.value));

        let recorder; 
        let audioChunks = [];
        const btn = document.getElementById('recordBtn');
        const status = document.getElementById('status');

        btn.onclick = async () => {
            const webhookUrl = urlInput.value.trim();
            if (!webhookUrl) {
                status.style.color = 'var(--galbau-red)';
                status.innerText = "Bitte unten die n8n URL eintragen.";
                setTimeout(() => status.style.color = 'var(--text-main)', 3000);
                return;
            }

            if (recorder && recorder.state === "recording") {
                recorder.stop();
                btn.innerText = "WAIT"; 
                btn.disabled = true;
                btn.classList.remove('recording');
                btn.style.backgroundColor = '#CCCCCC'; // Deaktiviert-Look
            } else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    recorder = new MediaRecorder(stream);
                    audioChunks = [];
                    
                    recorder.ondataavailable = e => audioChunks.push(e.data);
                    
                    recorder.onstop = async () => {
                        status.innerText = "KI verarbeitet lokal...";
                        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        const audioUrl = URL.createObjectURL(audioBlob);
                        
                        const transcriber = await window.transformers.pipeline('automatic-speech-recognition', 'Xenova/whisper-base');
                        const output = await transcriber(audioUrl, { language: 'german' });
                        
                        status.innerText = "Sende an Server...";
                        
                        await fetch(webhookUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ raw_text: output.text })
                        });
                        
                        status.innerText = "Erfolgreich übertragen!";
                        btn.innerText = "START"; 
                        btn.disabled = false;
                        btn.style.backgroundColor = 'var(--text-main)'; // Zurück zum Original
                        
                        setTimeout(() => {
                            if(btn.innerText === "START") status.innerText = "Bereit für das nächste Protokoll.";
                        }, 4000);
                    };
                    
                    recorder.start();
                    btn.innerText = "STOPP"; 
                    btn.classList.add('recording');
                    status.innerText = "Aufnahme läuft...";
                } catch (error) {
                    status.style.color = 'var(--galbau-red)';
                    status.innerText = "Mikrofon-Zugriff verweigert!";
                }
            }
        };
    </script>
</body>
</html>
